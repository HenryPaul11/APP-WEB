spring.config.import=optional:dotenv:./.env,optional:file:./.env[.properties]

spring.application.name=product-postgres-secure
server.port=8081

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:product_security_db}
spring.datasource.username=${DB_USERNAME:spring_app}
spring.datasource.password=${DB_PASSWORD:SpringPg_2026!}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.pool-name=ProductPool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.leak-detection-threshold=15000
spring.datasource.hikari.connection-init-sql=SET TIME ZONE 'UTC'
spring.datasource.hikari.data-source-properties.ApplicationName=product-api

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
info.app.name=Product PostgreSQL Secure API
info.app.version=1.0.0

app.admin.username=${APP_ADMIN_USERNAME:admin}
app.admin.password=${APP_ADMIN_PASSWORD}

logging.level.com.zaxxer.hikari=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.com.espe=DEBUG
server.error.include-message=always
server.error.include-binding-errors=always